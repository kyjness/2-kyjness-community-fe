name: Deploy Frontend to Amazon S3

on:
  push:
    branches: [ main ]
    # 프론트엔드 관련 파일이 변경될 때만 실행되도록 설정 (루트 경로 기준)
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC (AssumeRoleWithWebIdentity)
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Vite 8 권장 Node 버전

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        env:
          # 💡 README에 명시된 환경 변수 이름을 정확히 사용합니다.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }} 
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deployment
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: |
          # 빌드 결과물인 dist/ 폴더 내용을 S3 버킷으로 동기화합니다.
          # 버킷 이름은 테라폼에서 설정한 값(puppytalk-frontend-bucket)과 맞춰야 합니다.
          aws s3 sync dist/ s3://puppytalk-v2-frontend-bucket --delete 

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"